```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문구통합 문서 뷰어</title>

<style>
body { margin:0; font-family:sans-serif; }
.app { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

/* 📌 사이드바 */
.sidebar { border-right:1px solid #ddd; padding:20px; }
.nav-item {
  display:block; width:100%;
  padding:10px;
  border:0;
  background:none;
  cursor:pointer;
  text-align:left;
}
.nav-item.active {
  background:#e0f2fe;
  font-weight:bold;
}

/* 📌 메인 */
.main { padding:20px; }

/* 🔥 핵심 (이거 때문에 안되던거 해결) */
.sheet-panel { display:none; }
.sheet-panel.active { display:block; }

</style>
</head>

<body>

<div class="app">

  <!-- 📌 사이드바 -->
  <aside class="sidebar">

    <h2>淸賢</h2>

    <div class="nav">
      <button class="nav-item active" onclick="showSheet(0)">청현 공지사항</button>
      <button class="nav-item" onclick="showSheet(1)">임대차</button>
      <button class="nav-item" onclick="showSheet(2)">임금</button>
      <button class="nav-item" onclick="showSheet(3)">조세</button>
      <button class="nav-item" onclick="showSheet(4)">선순위임차인Q&A</button>
      <button class="nav-item" onclick="showSheet(5)">보증서Q&A</button>
      <button class="nav-item" onclick="showSheet(6)">피담보채무Q&A</button>
      <button class="nav-item" onclick="showSheet(7)">매각대상여부Q&A</button>
      <button class="nav-item" onclick="showSheet(8)">열람자료Q&A</button>
      <button class="nav-item" onclick="showSheet(9)">기계기구Q&A</button>
    </div>

  </aside>

  <!-- 📌 메인 -->
  <main class="main">

    <!-- 0 -->
    <div class="sheet-panel active" data-index="0">
      <h1>청현 공지사항</h1>
      <p>여기에 공지사항을 작성하세요.</p>
    </div>

    <!-- 1 -->
    <div class="sheet-panel" data-index="1">
      <h1>임대차</h1>
      <p>임대차 내용</p>
    </div>

    <!-- 2 -->
    <div class="sheet-panel" data-index="2">
      <h1>임금</h1>
    </div>

    <!-- 3 -->
    <div class="sheet-panel" data-index="3">
      <h1>조세</h1>
    </div>

    <!-- 나머지 -->
    <div class="sheet-panel" data-index="4"><h1>선순위임차인Q&A</h1></div>
    <div class="sheet-panel" data-index="5"><h1>보증서Q&A</h1></div>
    <div class="sheet-panel" data-index="6"><h1>피담보채무Q&A</h1></div>
    <div class="sheet-panel" data-index="7"><h1>매각대상여부Q&A</h1></div>
    <div class="sheet-panel" data-index="8"><h1>열람자료Q&A</h1></div>
    <div class="sheet-panel" data-index="9"><h1>기계기구Q&A</h1></div>

  </main>

</div>

<script>
function showSheet(index) {
  document.querySelectorAll('.sheet-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  document.querySelector('.sheet-panel[data-index="'+index+'"]').classList.add('active');
  document.querySelectorAll('.nav-item')[index].classList.add('active');
}
</script>

</body>
</html>
```
