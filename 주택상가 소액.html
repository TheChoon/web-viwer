<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주택/상가 소액보증금 조회</title>
  <style>
    :root {
      --bg1:#0f172a; --bg2:#1e293b; --card:#ffffff; --text:#0f172a; --muted:#64748b;
      --line:#e2e8f0; --shadow:0 20px 60px rgba(15,23,42,.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:"Segoe UI","Malgun Gothic",sans-serif; color:#e5e7eb;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.25), transparent 32%),
        radial-gradient(circle at bottom right, rgba(245,158,11,.18), transparent 28%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }
    .wrap{max-width:1240px;margin:0 auto;padding:48px 20px 80px}
    .hero{text-align:center;margin-bottom:24px}
    .hero h1{margin:0 0 10px;font-size:clamp(28px,4vw,44px);font-weight:800;letter-spacing:-.02em}
    .hero p{margin:0;color:#cbd5e1;font-size:16px}
    .panel{background:rgba(255,255,255,.08);backdrop-filter: blur(16px);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);border-radius:28px;padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:14px;align-items:end}
    .field label{display:block;margin:0 0 8px;font-size:14px;color:#cbd5e1}
    .input{width:100%;height:54px;border:none;outline:none;border-radius:16px;padding:0 16px;font-size:16px;background:#fff;color:var(--text)}
    .btn{height:54px;padding:0 22px;border:none;border-radius:16px;cursor:pointer;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 12px 24px rgba(37,99,235,.28)}
    .hint,.source{margin-top:14px;color:#cbd5e1;font-size:13px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(2,6,23,.58);backdrop-filter: blur(10px);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}
    .modal-backdrop.open{display:flex}
    .modal{width:min(1220px,100%);max-height:92vh;overflow:auto;background:var(--card);color:var(--text);border-radius:28px;box-shadow:0 30px 90px rgba(2,6,23,.35);padding:24px;position:relative}
    .close{position:absolute;top:14px;right:14px;width:40px;height:40px;border:none;border-radius:12px;background:#f1f5f9;cursor:pointer;font-size:20px}
    .modal-head{padding-right:52px;margin-bottom:18px}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:700}
    .modal-head h2{margin:12px 0 8px;font-size:30px;letter-spacing:-.02em}
    .sub{color:#64748b;font-size:15px}
    .summary{margin:18px 0 20px;border:1px solid #e2e8f0;border-radius:20px;padding:18px;background:linear-gradient(180deg,#f8fafc,#fff)}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .mini{border:1px solid #e2e8f0;border-radius:16px;padding:14px;background:#fff}
    .mini .k{display:block;color:#64748b;font-size:12px;margin-bottom:6px}
    .mini .v{font-size:15px;font-weight:700}
    .cards{display:grid;grid-template-columns:1fr 1.15fr;gap:16px}
    .card{border:1px solid #e2e8f0;border-radius:22px;padding:20px;background:#fff}
    .card.house{background:linear-gradient(180deg,#eff6ff,#fff)}
    .card.store{background:linear-gradient(180deg,#fff7ed,#fff)}
    .card h3{margin:0 0 12px;font-size:22px}
    .metric-grid{display:grid;gap:12px}
    .metric{border:1px solid #e2e8f0;border-radius:18px;padding:14px;background:rgba(255,255,255,.85)}
    .metric .k{color:#64748b;font-size:13px;margin-bottom:6px}
    .metric .v{font-size:28px;font-weight:800;letter-spacing:-.03em}
    .meta{display:grid;gap:10px;margin-top:18px}
    .row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px dashed #e2e8f0}
    .row:last-child{border-bottom:none}
    .row .k{color:#64748b} .row .v{text-align:right;font-weight:700}
    .section-title{margin:14px 0 8px;font-size:18px;font-weight:800}
    .table-wrap{border:1px solid #e2e8f0;border-radius:14px;overflow:auto;background:#fff}
    .table-wrap.house-table thead th{background:#dbeafe;color:#1e3a8a}
    .table-wrap.store-table thead th{background:#fef3c7;color:#92400e}
    .table-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
    @media (max-width:1000px){.table-grid{grid-template-columns:1fr}}

    table{width:100%;border-collapse:collapse;font-size:12px; line-height:1.2}
    th,td{padding:7px 6px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:middle;white-space:nowrap}
    th{background:#f8fafc;font-size:13px;color:#475569;position:sticky;top:0}
    tr:last-child td{border-bottom:none}
    .foot{margin-top:10px;border-top:1px solid #e2e8f0;padding-top:10px;color:#64748b;font-size:12px}
    .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .btn.secondary{background:#e2e8f0;color:#0f172a;box-shadow:none}
    .error-box{border:1px solid #fecaca;background:#fef2f2;color:#b91c1c;border-radius:16px;padding:16px;margin-top:12px}
    @media (max-width:1000px){.form-grid{grid-template-columns:1fr 1fr} .cards{grid-template-columns:1fr} .summary-grid{grid-template-columns:1fr 1fr}}
    @media (max-width:640px){.form-grid,.summary-grid{grid-template-columns:1fr} .modal-head h2{font-size:24px} .metric .v{font-size:22px}}
     .date-input-wrap{
      position:relative;
      display:flex;
      align-items:center;
      gap:8px;
    }
    
    #settingDateText{
      flex:1;
    }
    
    #settingDatePicker{
      position:absolute;
      right:56px;
      width:1px;
      height:1px;
      opacity:0;
      pointer-events:none;
    }
    
    .date-picker-btn{
      width:54px;
      height:54px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      font-size:20px;
      background:#fff;
      color:#0f172a;
      box-shadow:0 4px 14px rgba(15,23,42,.12);
      flex:0 0 54px;
    }
    
    .result-date-box{
      margin:14px 0 18px;
      padding:16px;
      border:1px solid #e2e8f0;
      border-radius:18px;
      background:#f8fafc;
    }
    
    .result-date-row{
      display:flex;
      gap:10px;
      align-items:end;
      flex-wrap:wrap;
    }
    
    .result-date-row .field-inline{
      flex:1 1 220px;
    }
    
    .result-date-row label{
      display:block;
      margin-bottom:8px;
      color:#475569;
      font-size:14px;
      font-weight:600;
    } 
  </style>
</head>
  <div class="wrap">
    <div class="hero">
      <h1>주택 / 상가 소액보증금 조회</h1>
      <p></p>
    </div>

  <div class="panel">
  <div class="form-grid">
    <div class="field">
      <label for="metroSelect">특별시 / 광역시 / 도</label>
      <select class="input" id="metroSelect"></select>
    </div>

    <div class="field">
      <label for="citySelect">시 / 군 / 구</label>
      <select class="input" id="citySelect"></select>
    </div>

    <div class="field">
      <label for="dongSelect">동 / 리 / 읍 / 면</label>
      <select class="input" id="dongSelect"></select>
    </div>

    <div class="field">
      <label for="settingDateText">근저당권 설정일</label>
      <div class="date-input-wrap">
        <input
          class="input"
          id="settingDateText"
          type="text"
          inputmode="numeric"
          placeholder="최초 설정일 입력칸에 날짜를 입력하세요"
          value="2023-02-21"
          autocomplete="off"
        />
        <input
          id="settingDatePicker"
          type="date"
          value="2023-02-21"
          tabindex="-1"
          aria-hidden="true"
        />
        <button type="button" class="date-picker-btn" id="openDatePicker">📅</button>
      </div>
    </div>

    <button class="btn" id="searchBtn" type="button">조회하기</button>
  </div>
</div>

<div class="copyright">© 2026 The춘. All rights reserved.</div>

<div class="modal-backdrop" id="resultModal">
  <div class="modal">
    <button class="close" id="closeModal">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<style>
  .copyright{
    margin-top:8px;

    function formatDateValue(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    
    function normalizeDateInput(raw) {
      if (!raw) return "";
    
      let v = String(raw).trim();
      v = v.replace(/\./g, "-").replace(/\//g, "-").replace(/\s+/g, "");
    
      if (/^\d{8}$/.test(v)) {
        return `${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`;
      }
    
      if (/^\d{7}$/.test(v)) {
        return `${v.slice(0,4)}-0${v.slice(4,5)}-${v.slice(5,7)}`;
      }
    
      const m = v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) {
        const yyyy = m[1];
        const mm = String(Number(m[2])).padStart(2, "0");
        const dd = String(Number(m[3])).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }
    
      return v;
    }
    
    function isValidDateString(dateStr) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return false;
      const d = new Date(dateStr + "T00:00:00");
      return !Number.isNaN(d.getTime()) && formatDateValue(d) === dateStr;
    }
    
    function syncDateInputs(dateStr) {
      settingDateText.value = dateStr;
      settingDatePicker.value = dateStr;
    }
    
    function normalizeMainDateInput() {
      const normalized = normalizeDateInput(settingDateText.value);
      if (isValidDateString(normalized)) {
        syncDateInputs(normalized);
        return normalized;
      }
      return "";
    }

    function scoreRegion(row, metro, city, dong) {
      if (row.metro === metro && row.city_gu === city && row.dong === dong) return 4;
      if (row.metro === metro && row.city_gu === city && row.dong === "전체") return 3;
      if (row.metro === metro && row.city_gu === "전체") return 2;
      return 0;
    }

    function findCurrentHousing(metro, city, dong, settingDate) {
      return HOUSING_DATA
        .map(r => ({...r, score: scoreRegion(r, metro, city, dong)}))
        .filter(r => r.score > 0)
        .filter(r => toDate(r.start_date) <= settingDate && settingDate <= toDate(r.end_date))
        .sort((a,b) => (b.score - a.score) || (toDate(b.start_date) - toDate(a.start_date)))[0] || null;
    }

    function scoreCommercialRegion(row, metro, city, dong) {
      if (row.metro === metro && row.city_gu === city && row.dong === dong) return 4;
      if (row.metro === metro && row.city_gu === city && row.dong === "전체") return 3;
      if (row.metro === metro && row.city_gu === "전체") return 2;
      if (row.metro === metro) return 1;
      return 0;
    }

    function addDays(dateStr, days) {
      const d = toDate(dateStr);
      d.setDate(d.getDate() + days);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function normalizeCommercialHistoryRows(rows) {
      const bestByStart = new Map();

      rows.forEach(r => {
        const key = r.start_date;
        if (!bestByStart.has(key)) {
          bestByStart.set(key, {...r});
          return;
        }
        const prev = bestByStart.get(key);
        if ((r.score || 0) > (prev.score || 0)) {
          bestByStart.set(key, {...r});
        }
      });

      const normalized = [...bestByStart.values()]
        .sort((a, b) => toDate(a.start_date) - toDate(b.start_date))
        .map(r => ({...r}));

      for (let i = 0; i < normalized.length; i++) {
        const next = normalized[i + 1];
        if (next) {
          normalized[i].end_date = addDays(next.start_date, -1);
        } else if (toDate(normalized[i].start_date) > toDate(normalized[i].end_date)) {
          normalized[i].end_date = "2026-12-31";
        }
      }

      return normalized.filter(r => toDate(r.start_date) <= toDate(r.end_date));
    }

    function findCurrentCommercial(metro, city, dong, settingDate) {
      return getCommercialHistory(metro, city, dong)
        .filter(r => toDate(r.start_date) <= settingDate && settingDate <= toDate(r.end_date))[0] || null;
    }

    function getHousingHistory(metro, city, dong) {
      const rows = HOUSING_DATA
        .map(r => ({...r, score: scoreRegion(r, metro, city, dong)}))
        .filter(r => r.score > 0)
        .sort((a,b) => toDate(a.start_date) - toDate(b.start_date));

      const bestByPeriod = new Map();
      rows.forEach(r => {
        const key = r.start_date + "|" + r.end_date;
        if(!bestByPeriod.has(key) || bestByPeriod.get(key).score < r.score) bestByPeriod.set(key, r);
      });
      return [...bestByPeriod.values()].sort((a,b) => toDate(a.start_date) - toDate(b.start_date));
    }

    function getCommercialHistory(metro, city, dong) {
      const rows = COMMERCIAL_DATA
        .map(r => ({...r, score: scoreCommercialRegion(r, metro, city, dong)}))
        .filter(r => r.score > 0)
        .sort((a,b) => toDate(a.start_date) - toDate(b.start_date));

      return normalizeCommercialHistoryRows(rows);
    }

            <div class="mini"><span class="k">특별시 / 광역시 / 도</span><div class="v">${metro}</div></div>
            <div class="mini"><span class="k">시 / 군 / 구</span><div class="v">${city}</div></div>
            <div class="mini"><span class="k">동 / 리 / 읍 / 면</span><div class="v">${dong}</div></div>
            <div class="mini">
                <span class="k">근저당권 설정일</span>
                <input
                  class="input"
                  id="modalSettingDate"
                  type="text"
                  value="${settingDateStr}"
                  placeholder="YYYY-MM-DD"
                  style="height:44px;font-size:15px;"
                />
                <button
                  class="btn"
                  type="button"
                  id="modalRequeryBtn"
                  style="margin-top:8px;height:44px;font-size:14px;padding:0 14px;"
                >
                  다시 조회
                </button>
              </div>
          </div>
        </div>
    
        <div class="cards">
          ${buildHousingCard(currentHousing, settingDateStr)}
          ${buildCommercialCard(currentCommercial, settingDateStr)}
        </div>
    
        <div class="table-grid">
          <div>
            <div class="section-title">주택용 소액 금액표</div>
            ${buildHousingTable(housingHistory)}
          </div>
          <div>
            <div class="section-title">상가용 소액 금액표</div>
            ${buildCommercialTable(commercialHistory)}
          </div>
        </div>
    
        <div class="foot">
          주택 표는 선택 주소와 관련된 전체 기간을, 주택 표와 상가 표 모두 선택한 지역과 가장 관련 있는 행만 기간별로 1건씩 표시합니다.
        </div>
    
        <div class="actions">
          <button class="btn secondary" onclick="document.getElementById('resultModal').classList.remove('open');">닫기</button>
        </div>
      `);
      const modalSettingDate = document.getElementById("modalSettingDate");
      const modalRequeryBtn = document.getElementById("modalRequeryBtn");
      
      if (modalSettingDate && modalRequeryBtn) {
        modalSettingDate.addEventListener("blur", () => {
          const normalized = normalizeDateInput(modalSettingDate.value);
          if (isValidDateString(normalized)) {
            modalSettingDate.value = normalized;
          }
        });
      
        modalSettingDate.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            modalRequeryBtn.click();
          }
        });
      
        modalRequeryBtn.addEventListener("click", () => {
          const normalized = normalizeDateInput(modalSettingDate.value);
      
          if (!isValidDateString(normalized)) {
            alert("날짜 형식은 YYYY-MM-DD 입니다.");
            return;
          }
      
          syncDateInputs(normalized);
          renderResult(normalized);
        });
      }
      const modalSettingDate = document.getElementById("modalSettingDate");
      const modalRequeryBtn = document.getElementById("modalRequeryBtn");
    
      modalSettingDate.addEventListener("blur", () => {
        const normalized = normalizeDateInput(modalSettingDate.value);
        if (isValidDateString(normalized)) {
          modalSettingDate.value = normalized;
        }
      });
    
      modalSettingDate.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const normalized = normalizeDateInput(modalSettingDate.value);
          if (!isValidDateString(normalized)) {
            alert("날짜 형식은 YYYY-MM-DD 입니다.");
            return;
          }
          syncDateInputs(normalized);
          renderResult(normalized);
        }
      });
    
      modalRequeryBtn.addEventListener("click", () => {
        const normalized = normalizeDateInput(modalSettingDate.value);
        if (!isValidDateString(normalized)) {
          alert("날짜 형식은 YYYY-MM-DD 입니다.");
          return;
        }
        syncDateInputs(normalized);
        renderResult(normalized);
      });
    }

    metroSelect.addEventListener("change", populateCity);
    citySelect.addEventListener("change", populateDong);
    
    openDatePickerBtn.addEventListener("click", () => {
      if (typeof settingDatePicker.showPicker === "function") {
        settingDatePicker.showPicker();
      } else {
        settingDatePicker.focus();
        settingDatePicker.click();
      }
    });
    
    settingDatePicker.addEventListener("change", () => {
      if (settingDatePicker.value) {
        syncDateInputs(settingDatePicker.value);
      }
    });
    
    settingDateText.addEventListener("blur", () => {
      normalizeMainDateInput();
    });
    
    settingDateText.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const ok = normalizeMainDateInput();
        if (ok) renderResult();
      }
    });
    
    document.getElementById("searchBtn").addEventListener("click", () => {
      const normalized = normalizeMainDateInput();
      if (!normalized) {
        openModal(`
          <div class="modal-head">
            <div class="eyebrow" style="background:#fef2f2;color:#b91c1c;">오류</div>
            <h2>조회에 실패했습니다</h2>
            <div class="error-box">최초 설정일 입력칸에 날짜를 입력하세요. 형식은 YYYY-MM-DD 입니다.</div>
          </div>
        `);
        return;
      }
      renderResult();
    });
    
    populateMetro();
    syncDateInputs("2023-02-21");
  </script>
</body>
</html>
